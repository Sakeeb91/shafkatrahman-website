      "alternativeHeadline": "$subtitle$",

      },

      "image": "https://shafkatrahman.com/writings/$slug$/card.png",
      "url": "https://shafkatrahman.com/writings/$slug$.html",
      "publisher": {
        "@type": "Person",
        "name": "Shafkat Rahman"
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://shafkatrahman.com/writings/$slug$.html"
      }
    }

    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500&amp;family=Inter:wght@400;500;600&amp;family=Cormorant+Garamond:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Source+Sans+3:wght@300;400;500;600&amp;display=swap" rel="stylesheet" fetchpriority="high">
    <link rel="stylesheet" href="../style.css?v=14">
    <link rel="stylesheet" href="../redesign.css?v=12">
    <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');</script>
    <script src="https://unpkg.com/lucide@0.576.0" defer></script>
    <!-- Equations are emitted as native MathML at build time. MathJax enhances
         that markup for consistent cross-browser typography; MathML remains
         readable if JavaScript or the CDN is unavailable. -->
    <script>window.MathJax = { options: { enableMenu: false } };</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>

    <style>
        :root {
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Source Sans 3', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html { font-size: 18px; scroll-behavior: smooth; }

        body {
            display: block;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            font-weight: 300;
            line-height: 1.75;
        }

        .frost-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(ellipse at 72% 12%, var(--color-frost-glow), transparent 42%);
        }

        .article-hero {
            max-width: 980px;
            margin: 0 auto;
            padding: 7rem 2rem 3rem;
            text-align: center;
        }

        .header-label,
        .article-date {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .header-label { margin: 0 0 1.5rem; color: var(--color-frost); }

        h1 {
            max-width: 900px;
            margin: 0 auto 1.25rem;
            color: var(--color-frost-light);
            font-family: var(--font-display);
            font-size: clamp(2.65rem, 6vw, 4.75rem);
            font-weight: 400;
            letter-spacing: -0.025em;
            line-height: 1.03;
            text-wrap: balance;
        }

        .subtitle {
            max-width: 720px;
            margin: 0 auto;
            color: var(--color-text-muted);
            font-family: var(--font-display);
            font-size: clamp(1.15rem, 2.3vw, 1.4rem);
            line-height: 1.45;
            text-wrap: balance;
        }

        .article-date { display: block; margin-top: 1.5rem; color: var(--color-text-dim); }

        .article-visual {
            width: min(1120px, calc(100% - 3rem));
            margin: 0 auto 5rem;
        }

        .article-visual img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        main { max-width: 760px; margin: 0 auto; padding: 0 2rem 5rem; }

        main > p:first-child {
            margin-bottom: 3rem;
            color: var(--color-text-muted);
            font-size: 1.18rem;
            line-height: 1.85;
        }

        section.level2 { margin-bottom: 4rem; }

        h2 {
            margin: 0 0 1.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
            color: var(--color-frost-light);
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.25rem);
            font-weight: 500;
            line-height: 1.2;
            text-wrap: balance;
        }

        p { margin: 0 0 1.5rem; color: var(--color-text); text-wrap: pretty; }
        strong { color: var(--color-frost); font-weight: 500; }
        em { color: var(--color-accent); }

        a {
            color: var(--color-frost);
            text-decoration-thickness: 1px;
            text-underline-offset: 0.18em;
        }

        a:hover { color: var(--color-frost-light); }

        code {
            padding: 0.12rem 0.35rem;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-bg-elevated);
            color: var(--color-accent-warm);
            font-family: var(--font-mono);
            font-size: 0.84em;
        }

        mjx-container[display="true"] {
            overflow-x: auto;
            overflow-y: hidden;
            margin: 2rem 0 !important;
            padding: 1.35rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            background: var(--color-bg-elevated);
            color: var(--color-frost-light);
        }

        /* Native MathML fallback before MathJax loads, or when JS is disabled. */
        math[display="inline"] {
            color: inherit;
            font-size: 1em;
        }

        math[display="block"] {
            display: block;
            width: 100%;
            margin: 2rem 0;
            padding: 1.35rem 1rem;
            overflow-x: auto;
            overflow-y: hidden;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            background: var(--color-bg-elevated);
            color: var(--color-frost-light);
        }

        hr { height: 1px; margin: 4rem 0; border: 0; background: var(--color-border); }

        ul, ol { margin: 0 0 1.75rem; padding-left: 1.35rem; }
        li { margin-bottom: 0.65rem; padding-left: 0.3rem; }
        li::marker { color: var(--color-frost); }

        #sources-and-notes + ul {
            list-style: none;
            padding-left: 0;
        }

        #sources-and-notes + ul li {
            margin: 0;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--color-border);
        }

        .article-email-capture {
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem;
            border-top: 1px solid var(--color-border);
        }

        .article-email-capture p { margin: 0 0 1rem; color: var(--color-text-muted); font-size: 0.9rem; }
        .article-email-capture form { display: flex; gap: 0.5rem; max-width: 28rem; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .article-email-capture input {
            min-width: 0;
            flex: 1;
            padding: 0.65rem 0.9rem;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-bg-elevated);
            color: var(--color-text);
            font: inherit;
            font-size: 0.86rem;
        }

        .article-email-capture input::placeholder { color: var(--color-text-dim); opacity: 1; }

        .article-email-capture button {
            padding: 0.65rem 1.2rem;
            border: 0;
            border-radius: 4px;
            background: var(--color-frost-light);
            color: var(--color-bg);
            cursor: pointer;
            font: inherit;
            font-size: 0.86rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .article-email-capture button:active { transform: translateY(1px); }
        .article-email-capture input:focus-visible,
        .article-email-capture button:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 3px; }

        .article-footer {
            margin-top: 4rem;
            padding: 3rem 2rem;
            border-top: 1px solid var(--color-border);
            color: var(--color-text-dim);
            text-align: center;
        }

        .article-footer p { margin: 0; }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.7rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            html { font-size: 16px; }
            .article-hero { padding: 5.5rem 1.25rem 2.5rem; }
            .article-visual { width: calc(100% - 2rem); margin-bottom: 3.5rem; }
            main { padding: 0 1.25rem 4rem; }
            .article-email-capture { padding: 2rem 1.25rem; }
            .article-email-capture form { flex-direction: column; }
            .article-email-capture button { width: 100%; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
        }

        @media print {
            .site-nav, .theme-toggle, .frost-bg, .article-email-capture { display: none; }
            body { background: white; color: black; }
            .article-hero { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i data-lucide="moon" class="moon-icon"></i>
        <i data-lucide="sun" class="sun-icon"></i>
    </button>

    <header class="site-nav" aria-label="Primary">
        <div class="container nav-inner">
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
                <i data-lucide="menu" class="hamburger-icon"></i>
                <i data-lucide="x" class="hamburger-close-icon"></i>
            </button>
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link nav-link-active" href="/writings/">Writing</a>
            <a class="nav-link" href="/reading/">Reading</a>
            <a class="nav-link" href="/resources/">Resources</a>
            <a class="nav-link" href="/advisory.html">Advisory</a>
        </div>
    </header>

    <div class="frost-bg"></div>

    <header class="article-hero">
        <p class="header-label">AI Infrastructure</p>
        <h1>$title$</h1>
        <p class="subtitle">$subtitle$</p>
        <time class="article-date" datetime="$date_iso$">$date$</time>
    </header>

    <figure class="article-visual">
        <img src="$slug$/hero.webp" width="1200" height="630" alt="A wafer-scale processor connected to a closed feedback loop of high-speed signals" fetchpriority="high">
    </figure>

    <main>
$body$
    </main>

    <div class="article-email-capture">
        <p>If you read this far, you'd probably like the newsletter. One analysis per week. Free.</p>
        <form onsubmit="event.preventDefault();var e=this.email.value,f=this;fetch('https://email-subscribe.rahman-sakeeb.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e})}).then(r=>{if(r.ok)f.parentElement.innerHTML='&lt;p class=subscription-message&gt;You\'re in. Check your inbox.&lt;/p&gt;';else f.parentElement.innerHTML='&lt;p class=subscription-message&gt;Something went wrong. Try again.&lt;/p&gt;'}).catch(()=>{f.parentElement.innerHTML='&lt;p class=subscription-message&gt;Something went wrong. Try again.&lt;/p&gt;'})">
            <label class="sr-only" for="article-email">Email address</label>
            <input id="article-email" type="email" name="email" autocomplete="email" placeholder="you@example.com" required>
            <button type="submit">Subscribe</button>
        </form>
    </div>

    <footer class="article-footer">
        <p>Published $date$ by Shafkat Rahman</p>
        <a href="/writings/" class="back-link">← Back to Writing</a>
    </footer>

    <script src="/writing-manifest.js?v=2" defer></script>
    <script src="../theme-toggle.js?v=8" defer></script>
</body>
</html>
